name: End-to-End Security Scans

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'maven'

      - name: Run SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >-
          mvn -B verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.organization=raghugaorgkey
          -Dsonar.projectKey=raghugaprojectkey

  snyk-scan:
    name: Snyk Scan
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'maven'

      - name: Run Snyk scan
        uses: snyk/actions/maven@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

  owasp-zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: snyk-scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'zulu'
          cache: 'maven'

      - name: Package application
        run: mvn -B clean package

      - name: Start application
        run: |
          nohup java -jar target/easybuggy.jar -httpPort=8080 > easybuggy.log 2>&1 &

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo 'Application failed to start'
          cat easybuggy.log
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://127.0.0.1:8080'

      - name: Upload application log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: easybuggy-log
          path: easybuggy.log
